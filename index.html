<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Trey May — Optical calibration / Narcissus Mirror activation" />
    <title>Trey May — Optical Calibration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="/assets/cupid.png" as="image" />
    <link rel="preload" href="/assets/qr.png" as="image" />
    <link rel="preload" href="/assets/fallback.mp4" as="video" type="video/mp4" />
    <link rel="preload" href="/assets/bass-hit.wav" as="audio" type="audio/wav" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <video id="source-video" playsinline muted autoplay hidden></video>
    <canvas id="procedural-source" aria-hidden="true"></canvas>

    <div id="app">
      <section id="init-scan" class="screen" aria-label="Calibration entry">
        <div class="terminal">
          <p id="init-line-primary" class="terminal-line mono"></p>
          <p id="tap-hint" class="tap-hint" hidden>TAP TO INITIATE</p>
        </div>
      </section>

      <section id="mirror-stage" class="mirror-stage hidden" aria-label="Mirror experience">
        <canvas id="webgl-canvas"></canvas>
        <div id="eye-fx-layer" class="eye-fx-layer" aria-hidden="true">
          <span id="eye-left" class="eye-dot"></span>
          <span id="eye-right" class="eye-dot"></span>
        </div>

        <div id="ui-layer" class="ui-layer">
          <p class="headline brutal">Adornment is a weapon. Claim your armor.</p>
          <form id="acquire-form" class="brutal-form">
            <label class="sr-only" for="email-input">Email</label>
            <input
              id="email-input"
              type="email"
              name="email"
              autocomplete="email"
              placeholder="YOU@DOMAIN"
              required
            />
            <button type="submit" id="submit-btn" class="brutal-submit">(ENTER)</button>
          </form>
        </div>

        <div id="cupid-layer" class="cupid-layer" aria-hidden="true">
          <div class="cupid-frame">
            <img
              src="/assets/cupid.png"
              alt=""
              class="cupid-art"
              width="280"
              height="520"
              loading="lazy"
            />
          </div>
        </div>
      </section>

      <section id="archival-stage" class="screen archival hidden" aria-live="polite">
        <div class="terminal-out mono">
          <p>&gt; ARCHIVE ENTRY LOGGED.</p>
          <p>&gt; PREPARE FOR 0.925.</p>
        </div>
        <a
          class="instagram-pulse brutal"
          href="https://www.instagram.com/TreyMayCo"
          target="_blank"
          rel="noopener noreferrer"
          id="instagram-link"
        >
          FOLLOW @TreyMayCo
        </a>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
